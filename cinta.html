<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Rain for Meli</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            height: 100vh;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            position: absolute;
            width: 100%;
            height: 100%;
            perspective: 1000px; /* Memberi efek kedalaman */
        }

        /* Animasi Utama: Dari Tengah Meledak ke Luar */
        @keyframes explodeOut {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            100% {
                /* Bergerak ke arah acak sesuai variabel CSS */
                transform: translate(var(--x), var(--y)) scale(1.5);
                opacity: 0;
            }
        }

        .item {
            position: absolute;
            top: 50%;
            left: 50%;
            pointer-events: none;
            will-change: transform, opacity; /* Optimasi performa HP */
            animation: explodeOut linear forwards;
        }

        .neon-text {
            color: #fff;
            white-space: nowrap;
            text-shadow: 0 0 10px #ff00bf, 0 0 20px #ff00b3;
            font-size: 20px;
        }

        .star {
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px #fff;
        }

        .heart {
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
        }

        .floating-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 15px;
            border: 2px solid #fff;
            box-shadow: 0 0 20px #ff009d;
        }
    </style>
</head>
<body onload="start()">

    <div class="container" id="main"></div>

    <audio id="bgMusic" loop preload="auto" playsinline>
        <source src="Hei Manis.mpeg" type="audio/mpeg">
    </audio>

    <script>
        const container = document.getElementById('main');
        const audio = document.getElementById('bgMusic');

        const photos = [
            "meli/DSC00011~2.JPG", "meli/DSC00012~2.JPG", "meli/DSC00015~2.JPG",
            "meli/DSC00043~2.JPG", "meli/DSC00046~2.JPG", "meli/DSC00050~2.JPG",
            "meli/DSC07249~2.JPG", "meli/DSC07250~2.JPG", "meli/DSC07251~2.JPG",
            "meli/DSC09741.JPG", "meli/DSC09743.JPG", "meli/GIO02356.JPG",
            "meli/GIO02357.JPG", "meli/GIO06636~2 (1).jpg", "meli/IMG-20260311-WA0026.jpg",
            "meli/IMG-20260311-WA0028.jpg", "meli/jhjjjkkgkjkjjj.png", "meli/meli copy.jpg",
            "meli/memori 1.jpg", "meli/memori 2.jpg", "meli/memori 3.png",
            "meli/memori 4.jpg", "meli/Screenshot_20251019-093206.png",
            "meli/Screenshot_20260213-090339~2.jpg", "meli/Screenshot_20260213-090343~2.jpg",
            "meli/Screenshot_20260216-090242~2.png", "meli/Screenshot_20260216-162016~2.png",
            "meli/Screenshot_20260216-162026~2.png", "meli/Screenshot_20260216-162036~2.png",
            "meli/Screenshot_20260216-162044~2.png", "meli/Screenshot_20260216-162053~2.png",
            "meli/Screenshot_20260216-162104~2.png", "meli/Screenshot_20260216-162112~2.png",
            "meli/Screenshot_20260219-123700~2.png", "meli/Screenshot_20260321-131444~2.png",
            "meli/Screenshot_20260321-131444~24.png", "meli/Screenshot_20260321-131444~26.png",
            "meli/Screenshot_20260321-131444~269.png", "meli/Screenshot_20260410-152545~2.png",
            "meli/WhatsApp Image 2026-04-21 at 03.31.01 (1).jpeg", "meli/WhatsApp Image 2026-04-30 at 18.56.50.jpeg"
        ];

        function start() {
            // Interval diperlambat jadi 150ms agar HP tidak lag (lebih ringan)
            setInterval(createLove, 150);
            
            // Logika Autoplay
            audio.muted = true;
            audio.play().then(() => {
                setTimeout(() => { audio.muted = false; }, 500);
            }).catch(() => {
                const playOnInteraction = () => {
                    audio.muted = false;
                    audio.play();
                    document.removeEventListener('click', playOnInteraction);
                };
                document.addEventListener('click', playOnInteraction);
            });
        }

        function createLove() {
            const rand = Math.random();
            let el = document.createElement('div');
            el.className = 'item';

            // Menentukan konten
            if (rand > 0.90) {
                const img = document.createElement('img');
                img.className = 'floating-img';
                img.src = photos[Math.floor(Math.random() * photos.length)];
                el.appendChild(img);
            } else if (rand > 0.70) { 
                el.innerHTML = '<span class="heart">❤️</span>';
                el.style.fontSize = Math.random() * 30 + 10 + 'px';
            } else if (rand > 0.40) {
                el.className += ' star';
                const size = Math.random() * 5 + 2 + 'px';
                el.style.width = size;
                el.style.height = size;
            } else { 
                el.innerHTML = '<span class="neon-text">I love you ♡</span>';
                el.style.fontSize = Math.random() * 20 + 10 + 'px';
            }

            // Arah Gerak: Membuat koordinat tujuan acak (ke segala arah)
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 150 + 100; // Seberapa jauh meledaknya
            const tx = Math.cos(angle) * distance + 'vw';
            const ty = Math.sin(angle) * distance + 'vh';

            el.style.setProperty('--x', tx);
            el.style.setProperty('--y', ty);

            // Durasi acak agar tidak menumpuk kaku
            const duration = Math.random() * 3 + 2;
            el.style.animationDuration = duration + 's';

            container.appendChild(el);
            
            // Hapus elemen segera setelah animasi selesai
            setTimeout(() => el.remove(), duration * 1000);
        }
    </script>
</body>
</html>
