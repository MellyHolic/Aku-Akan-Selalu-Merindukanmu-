<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Rain for Meli</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        #main {
            position: relative;
            width: 100vw;
            height: 100vh;
            perspective: 1200px;
        }

        /* Animasi meledak ke luar */
        @keyframes explode {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1.5);
                opacity: 0;
            }
        }

        .item {
            position: absolute;
            top: 50%;
            left: 50%;
            will-change: transform, opacity;
            animation: explode linear forwards;
            pointer-events: none;
        }

        .floating-img {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #fff;
            box-shadow: 0 0 20px rgba(255, 0, 191, 0.8);
            z-index: 99; /* Foto selalu paling depan */
        }

        .neon-text {
            color: #fff;
            white-space: nowrap;
            text-shadow: 0 0 10px #ff00bf, 0 0 20px #ff00b3;
            font-family: 'Arial Black', sans-serif;
        }

        .heart {
            font-size: 25px;
            filter: drop-shadow(0 0 5px red);
        }
    </style>
</head>
<body onload="start()">

    <div id="main"></div>

    <audio id="bgMusic" loop preload="auto" playsinline>
        <source src="Hei Manis.mpeg" type="audio/mpeg">
    </audio>

    <script>
        const container = document.getElementById('main');
        const audio = document.getElementById('bgMusic');

        const photos = [
            "meli/DSC00011~2.JPG", "meli/DSC00012~2.JPG", "meli/DSC00015~2.JPG",
            "meli/DSC00043~2.JPG", "meli/DSC00046~2.JPG", "meli/DSC00050~2.JPG",
            "meli/DSC07249~2.JPG", "meli/DSC07250~2.JPG", "meli/DSC07251~2.JPG",
            "meli/DSC09741.JPG", "meli/DSC09743.JPG", "meli/GIO02356.JPG",
            "meli/GIO02357.JPG", "meli/GIO06636~2 (1).jpg", "meli/IMG-20260311-WA0026.jpg",
            "meli/IMG-20260311-WA0028.jpg", "meli/jhjjjkkgkjkjjj.png", "meli/meli copy.jpg",
            "meli/memori 1.jpg", "meli/memori 2.jpg", "meli/memori 3.png",
            "meli/memori 4.jpg", "meli/Screenshot_20251019-093206.png",
            "meli/Screenshot_20260213-090339~2.jpg", "meli/Screenshot_20260213-090343~2.jpg",
            "meli/Screenshot_20260216-090242~2.png", "meli/Screenshot_20260216-162016~2.png",
            "meli/Screenshot_20260216-162026~2.png", "meli/Screenshot_20260216-162036~2.png",
            "meli/Screenshot_20260216-162044~2.png", "meli/Screenshot_20260216-162053~2.png",
            "meli/Screenshot_20260216-162104~2.png", "meli/Screenshot_20260216-162112~2.png",
            "meli/Screenshot_20260219-123700~2.png", "meli/Screenshot_20260321-131444~2.png",
            "meli/Screenshot_20260321-131444~24.png", "meli/Screenshot_20260321-131444~26.png",
            "meli/Screenshot_20260321-131444~269.png", "meli/Screenshot_20260410-152545~2.png",
            "meli/WhatsApp Image 2026-04-21 at 03.31.01 (1).jpeg", "meli/WhatsApp Image 2026-04-30 at 18.56.50.jpeg"
        ];

        function start() {
            // Interval 200ms agar sangat ringan di HP
            setInterval(createExplosion, 200);
            
            // Autoplay logic
            audio.muted = true;
            audio.play().then(() => {
                setTimeout(() => { audio.muted = false; }, 100);
            }).catch(() => {
                window.addEventListener('click', () => {
                    audio.muted = false;
                    audio.play();
                }, { once: true });
            });
        }

        function createExplosion() {
            const el = document.createElement('div');
            el.className = 'item';
            
            const rand = Math.random();
            
            if (rand > 0.85) {
                // Foto Meli
                const img = new Image();
                img.src = photos[Math.floor(Math.random() * photos.length)];
                img.className = 'floating-img';
                el.appendChild(img);
            } else if (rand > 0.50) {
                // Teks Neon
                el.innerHTML = '<span class="neon-text">I Love You Meli</span>';
                el.style.fontSize = Math.random() * 15 + 10 + 'px';
            } else {
                // Hati
                el.innerHTML = '<span class="heart">❤️</span>';
            }

            // Hitung arah ledakan (360 derajat)
            const angle = Math.random() * Math.PI * 2;
            const dist = 120; // Jarak terbang dalam vh/vw
            const tx = Math.cos(angle) * dist + 'vw';
            const ty = Math.sin(angle) * dist + 'vh';

            el.style.setProperty('--x', tx);
            el.style.setProperty('--y', ty);

            const duration = Math.random() * 2 + 3;
            el.style.animationDuration = duration + 's';

            container.appendChild(el);
            setTimeout(() => el.remove(), duration * 1000);
        }
    </script>
</body>
</html>
